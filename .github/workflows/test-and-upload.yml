name: "Test And Upload"
on:
  push:
    branches:
      - master
      - 1.x
      - develop
      - test*
      - fix*
    paths-ignore:
      - "_script/**"
      - "doc/**"
      - "**/*.md"
      - "**/.gitignore"
      - "**/LICENSE"
  pull_request:
    branches:
      - master
      - develop
      - 1.x
    paths-ignore:
      - "_script/**"
      - "doc/**"
      - "**/*.md"
      - "**/.gitignore"
      - "**/LICENSE"
  workflow_dispatch:
jobs:
  test-and-upload:
    runs-on: ${{ contains(matrix.os, '-arm') && matrix.os || format('{0}-latest', matrix.os) }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      BETTER_SQLITE3_PREBUILDS_CACHE: ${{ github.workspace }}/.cache/better-sqlite3-prebuilds
      VUE_APP_PUBLISH_CHANNEL: beta
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows
          - ubuntu
          # - ubuntu-24.04-arm
          - macos
        node:
          - 22
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4.1.7
        with:
          submodules: true
          fetch-depth: 0
      - name: "Setup pnpm"
        uses: pnpm/action-setup@v4
      - name: 'Setup Node.js "${{ matrix.node }}.x" environment'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          registry-url: https://npm.pkg.github.com/
          cache: pnpm
      - name: "Setup Python environment, because of electron-builder install-app-deps requires Python setup tools"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: "Pin node-gyp to setup-python interpreter"
        shell: bash
        run: |
          PYTHON_BIN="$(python -c 'import sys; print(sys.executable)')"
          echo "PYTHON=$PYTHON_BIN" >> "$GITHUB_ENV"
          echo "npm_config_python=$PYTHON_BIN" >> "$GITHUB_ENV"
          echo "NODE_GYP_FORCE_PYTHON=$PYTHON_BIN" >> "$GITHUB_ENV"
      - name: "Print pinned node-gyp python"
        shell: bash
        run: |
          echo "================================================================"
          echo "Pinned Python for node-gyp"
          echo "----------------"
          echo "PYTHON=$PYTHON"
          echo "npm_config_python=$npm_config_python"
          echo "NODE_GYP_FORCE_PYTHON=$NODE_GYP_FORCE_PYTHON"
          "$PYTHON" --version
      - name: "Get package info"
        id: package-info
        uses: luizfelipelaviola/get-package-info@v1
        with:
          path: ./packages/gui
      - name: "Compute beta build version"
        shell: bash
        run: |
          BASE_VERSION="${{ steps.package-info.outputs.version }}"
          BUILD_VERSION="${BASE_VERSION}-beta.${{ github.run_number }}"
          echo "BUILD_VERSION=${BUILD_VERSION}" >> "$GITHUB_ENV"
      - name: "Apply beta version to packages/gui/package.json"
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='packages/gui/package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.version=process.env.BUILD_VERSION;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\\n');console.log('set gui version to',j.version);"
      - name: "Print"
        run: |
          echo "version = ${{ steps.package-info.outputs.version }}";
          echo "build version = ${{ env.BUILD_VERSION }}";
          echo "github.ref_type = ${{ github.ref_type }}";
          echo "github.ref = ${{ github.ref }}";
          echo "github.ref_name = ${{ github.ref_name }}";
      - name: "npm -v | pnpm -v | python --version"
        run: |
          echo "================================================================";
          echo "npm -v";
          echo "----------------";
          npm -v;
          echo "================================================================";
          echo "pnpm -v";
          echo "----------------";
          pnpm -v;
          echo "================================================================";
          echo "python --version";
          echo "----------------";
          python --version;
      - name: "Setup electron cache"
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache/electron
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-
      - name: "Setup electron-builder cache"
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache/electron-builder
          key: ${{ runner.os }}-electron-builder-cache-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-builder-cache-
      - name: "Setup better-sqlite3 prebuild cache"
        if: ${{ matrix.os == 'ubuntu' || matrix.os == 'ubuntu-24.04-arm' }}
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache/better-sqlite3-prebuilds
          key: ${{ runner.os }}-${{ runner.arch }}-better-sqlite3-prebuilds-${{ hashFiles('pnpm-lock.yaml', 'packages/gui/package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-better-sqlite3-prebuilds-
      - name: "Set C++17 compiler flags (non-Windows)"
        if: ${{ matrix.os != 'windows' }}
        run: |
          echo "CXXFLAGS=-std=c++17" >> $GITHUB_ENV
          echo "CFLAGS=-std=c11" >> $GITHUB_ENV
      - name: "Set C++17 compiler flags (Windows)"
        if: ${{ matrix.os == 'windows' }}
        run: |
          echo "CL=/std:c++17" >> $env:GITHUB_ENV
      - name: "'pnpm install' Because we need to install optional dependencies"
        run: |
          echo "================================================================";
          dir || ls -lah;
          echo "================================================================";
          echo "pnpm install";
          echo "----------------";
          pnpm install;
      - name: "test packages/core"
        run: |
          cd packages/core;
          pnpm run test;
      - name: "test packages/mitmproxy"
        run: |
          cd packages/mitmproxy;
          pnpm run test;
      - name: "Prefetch better-sqlite3 Electron prebuild (Linux)"
        if: ${{ matrix.os == 'ubuntu' || matrix.os == 'ubuntu-24.04-arm' }}
        shell: bash
        run: |
          set -euo pipefail
          PREBUILD_DIR="$BETTER_SQLITE3_PREBUILDS_CACHE"
          mkdir -p "$PREBUILD_DIR"
          BETTER_SQLITE3_VERSION="$(node -p "require('./packages/gui/package.json').dependencies['better-sqlite3']")"
          ELECTRON_VERSION="$(node -p "require('./packages/gui/node_modules/electron/package.json').version")"
          ELECTRON_ABI="$(node -p "require('./node_modules/node-abi').getAbi(process.argv[1], 'electron')" "$ELECTRON_VERSION")"
          ARCH="$(node -p "process.arch")"
          FILE_NAME="better-sqlite3-v${BETTER_SQLITE3_VERSION}-electron-v${ELECTRON_ABI}-linux-${ARCH}.tar.gz"
          DOWNLOAD_URL="https://github.com/WiseLibs/better-sqlite3/releases/download/v${BETTER_SQLITE3_VERSION}/${FILE_NAME}"
          echo "================================================================"
          echo "Prefetch better-sqlite3 Electron prebuild"
          echo "----------------"
          echo "BETTER_SQLITE3_VERSION=$BETTER_SQLITE3_VERSION"
          echo "ELECTRON_VERSION=$ELECTRON_VERSION"
          echo "ELECTRON_ABI=$ELECTRON_ABI"
          echo "ARCH=$ARCH"
          echo "FILE_NAME=$FILE_NAME"
          echo "DOWNLOAD_URL=$DOWNLOAD_URL"
          if [ ! -s "$PREBUILD_DIR/$FILE_NAME" ]; then
            curl -fL \
              --retry 6 \
              --retry-delay 5 \
              --retry-all-errors \
              --connect-timeout 20 \
              --max-time 300 \
              -o "$PREBUILD_DIR/$FILE_NAME" \
              "$DOWNLOAD_URL"
          fi
          ls -lah "$PREBUILD_DIR"
      - name: "Cache Flatpak runtime (Linux)"
        if: ${{ matrix.os == 'ubuntu' }}
        id: cache-flatpak-runtime
        uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-runtime-freedesktop-21.08
      - name: "Install Flatpak tooling (Linux)"
        if: ${{ matrix.os == 'ubuntu' }}
        run: |
          sudo apt-get update -y
          sudo apt-get install -y flatpak flatpak-builder xdg-desktop-portal appstream fuse3
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          sudo apparmor_parser -R /etc/apparmor.d/bwrap 2>/dev/null || true
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          if [ "${{ steps.cache-flatpak-runtime.outputs.cache-hit }}" != "true" ]; then
            flatpak install --user -y flathub org.freedesktop.Platform//21.08 org.freedesktop.Sdk//21.08
          fi
          flatpak --version
          flatpak-builder --version
      - name: "Cache Flatpak runtime (Linux ARM64)"
        if: ${{ matrix.os == 'ubuntu-24.04-arm' }}
        id: cache-flatpak-runtime-linux-arm64
        uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-runtime-freedesktop-21.08
      - name: "Install Flatpak tooling (Linux ARM64)"
        if: ${{ matrix.os == 'ubuntu-24.04-arm' }}
        run: |
          sudo apt-get update -y
          sudo apt-get install -y flatpak flatpak-builder xdg-desktop-portal appstream fuse3
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          sudo apparmor_parser -R /etc/apparmor.d/bwrap 2>/dev/null || true
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          if [ "${{ steps.cache-flatpak-runtime-linux-arm64.outputs.cache-hit }}" != "true" ]; then
            flatpak install --user -y flathub org.freedesktop.Platform//21.08 org.freedesktop.Sdk//21.08
          fi
          flatpak --version
          flatpak-builder --version
      - name: "Special preparation for Linux ARM64 build"
        if: ${{ matrix.os == 'ubuntu-24.04-arm' }}
        run: |
          echo "================================================================";
          echo "Run _script/linux-arm64-prepare.sh";
          echo "----------------";
          bash _script/linux-arm64-prepare.sh;
      - name: "npm run electron:build (Windows/macOS)"
        if: ${{ matrix.os != 'ubuntu' && matrix.os != 'ubuntu-24.04-arm' }}
        run: |
          echo "================================================================";
          echo "cd packages/gui";
          echo "----------------";
          cd packages/gui;
          dir || ls -lah;
          echo "================================================================";
          echo "npm run electron:build";
          echo "----------------";
          npm run electron:build;
      - name: "npm run electron:build (Linux & Linux ARM64)"
        if: ${{ matrix.os == 'ubuntu' || matrix.os == 'ubuntu-24.04-arm' }}
        env:
          DEBUG: "@malept/flatpak-bundler"
          npm_config_better_sqlite3_local_prebuilds: ${{ github.workspace }}/.cache/better-sqlite3-prebuilds
        run: |
          echo "================================================================";
          echo "cd packages/gui";
          echo "----------------";
          cd packages/gui;
          ls -lah;
          echo "================================================================";
          echo "npm run electron:build";
          echo "----------------";
          dbus-run-session -- npm run electron:build;
      - name: 'Print dir "packages/gui/dist_electron/"'
        run: |
          echo "================================================================";
          echo "cd packages/gui/dist_electron";
          echo "----------------";
          cd packages/gui/dist_electron;
          dir || ls -lah;
      - name: "Rename artifacts - Windows"
        if: ${{ matrix.os == 'windows' }}
        run: |
          cd packages/gui/dist_electron;
          ren DevSidecar-${{ env.BUILD_VERSION }}-x64.exe   DevSidecar-${{ env.BUILD_VERSION }}-windows-x86_64.exe;
          ren DevSidecar-${{ env.BUILD_VERSION }}-ia32.exe  DevSidecar-${{ env.BUILD_VERSION }}-windows-ia32.exe;
          ren DevSidecar-${{ env.BUILD_VERSION }}-arm64.exe DevSidecar-${{ env.BUILD_VERSION }}-windows-arm64.exe;
          dir;
      - name: "Rename artifacts - Linux"
        if: ${{ matrix.os == 'ubuntu' }}
        run: |
          cd packages/gui/dist_electron;
          mv DevSidecar-${{ env.BUILD_VERSION }}-amd64.deb       DevSidecar-${{ env.BUILD_VERSION }}-linux-x86_64.deb;
          mv DevSidecar-${{ env.BUILD_VERSION }}-x86_64.AppImage DevSidecar-${{ env.BUILD_VERSION }}-linux-x86_64.AppImage;
          mv DevSidecar-${{ env.BUILD_VERSION }}-x64.tar.gz      DevSidecar-${{ env.BUILD_VERSION }}-linux-x86_64.tar.gz;
          mv DevSidecar-${{ env.BUILD_VERSION }}-x86_64.rpm      DevSidecar-${{ env.BUILD_VERSION }}-linux-x86_64.rpm;
          ls -lah;
      - name: "Rename artifacts - Linux ARM64"
        if: ${{ matrix.os == 'ubuntu-24.04-arm' }}
        run: |
          cd packages/gui/dist_electron;
          mv DevSidecar-${{ env.BUILD_VERSION }}-arm64.deb      DevSidecar-${{ env.BUILD_VERSION }}-linux-arm64.deb;
          mv DevSidecar-${{ env.BUILD_VERSION }}-arm64.AppImage DevSidecar-${{ env.BUILD_VERSION }}-linux-arm64.AppImage;
          mv DevSidecar-${{ env.BUILD_VERSION }}-arm64.tar.gz   DevSidecar-${{ env.BUILD_VERSION }}-linux-arm64.tar.gz;
          mv DevSidecar-${{ env.BUILD_VERSION }}-aarch64.rpm    DevSidecar-${{ env.BUILD_VERSION }}-linux-arm64.rpm;
          mv DevSidecar-${{ env.BUILD_VERSION }}-arm64.flatpak  DevSidecar-${{ env.BUILD_VERSION }}-linux-arm64.flatpak;
          ls -lah;
      - name: "Rename artifacts - macOS"
        if: ${{ matrix.os == 'macos' }}
        run: |
          cd packages/gui/dist_electron;
          mv DevSidecar-${{ env.BUILD_VERSION }}-x64.dmg       DevSidecar-${{ env.BUILD_VERSION }}-macos-x86_64.dmg;
          mv DevSidecar-${{ env.BUILD_VERSION }}-arm64.dmg     DevSidecar-${{ env.BUILD_VERSION }}-macos-arm64.dmg;
          mv DevSidecar-${{ env.BUILD_VERSION }}-universal.dmg DevSidecar-${{ env.BUILD_VERSION }}-macos-universal.dmg;
          ls -lah;
      # region Upload artifacts - Windows
      - name: "Upload DevSidecar-${{ env.BUILD_VERSION }}-windows-x86_64.exe"
        uses: actions/upload-artifact@v4.4.0
        if: ${{ matrix.os == 'windows' }}
        with:
          path: packages/gui/dist_electron/DevSidecar-${{ env.BUILD_VERSION }}-windows-x86_64.exe
          name: "DevSidecar-${{ env.BUILD_VERSION }}-windows-x86_64.exe"
          if-no-files-found: error
      - name: "Upload DevSidecar-${{ env.BUILD_VERSION }}-windows-ia32.exe"
        uses: actions/upload-artifact@v4.4.0
        if: ${{ matrix.os == 'windows' }}
        with:
          path: packages/gui/dist_electron/DevSidecar-${{ env.BUILD_VERSION }}-windows-ia32.exe
          name: "DevSidecar-${{ env.BUILD_VERSION }}-windows-ia32.exe"
          if-no-files-found: error
      - name: "Upload DevSidecar-${{ env.BUILD_VERSION }}-windows-arm64.exe"
        uses: actions/upload-artifact@v4.4.0
        if: ${{ matrix.os == 'windows' }}
        with:
          path: packages/gui/dist_electron/DevSidecar-${{ env.BUILD_VERSION }}-windows-arm64.exe
          name: "DevSidecar-${{ env.BUILD_VERSION }}-windows-arm64.exe"
          if-no-files-found: error
      # endregion Upload artifacts - Windows
      # region Upload artifacts - Linux
      - name: "Upload DevSidecar-${{ env.BUILD_VERSION }}-linux-x86_64.deb"
        uses: actions/upload-artifact@v4.4.0
        if: ${{ matrix.os == 'ubuntu' }}
        with:
          path: packages/gui/dist_electron/DevSidecar-${{ env.BUILD_VERSION }}-linux-x86_64.deb
          name: "DevSidecar-${{ env.BUILD_VERSION }}-linux-x86_64.deb"
          if-no-files-found: error
      - name: "Upload DevSidecar-${{ env.BUILD_VERSION }}-linux-x86_64.AppImage"
        uses: actions/upload-artifact@v4.4.0
        if: ${{ matrix.os == 'ubuntu' }}
        with:
          path: packages/gui/dist_electron/DevSidecar-${{ env.BUILD_VERSION }}-linux-x86_64.AppImage
          name: "DevSidecar-${{ env.BUILD_VERSION }}-linux-x86_64.AppImage"
          if-no-files-found: error
      - name: "Upload DevSidecar-${{ env.BUILD_VERSION }}-linux-x86_64.tar.gz"
        uses: actions/upload-artifact@v4.4.0
        if: ${{ matrix.os == 'ubuntu' }}
        with:
          path: packages/gui/dist_electron/DevSidecar-${{ env.BUILD_VERSION }}-linux-x86_64.tar.gz
          name: "DevSidecar-${{ env.BUILD_VERSION }}-linux-x86_64.tar.gz"
          if-no-files-found: error
      - name: "Upload DevSidecar-${{ env.BUILD_VERSION }}-linux-x86_64.rpm"
        uses: actions/upload-artifact@v4.4.0
        if: ${{ matrix.os == 'ubuntu' }}
        with:
          path: packages/gui/dist_electron/DevSidecar-${{ env.BUILD_VERSION }}-linux-x86_64.rpm
          name: "DevSidecar-${{ env.BUILD_VERSION }}-linux-x86_64.rpm"
          if-no-files-found: error
      - name: "Upload DevSidecar-${{ env.BUILD_VERSION }}-linux-arm64.deb"
        uses: actions/upload-artifact@v4.4.0
        if: ${{ matrix.os == 'ubuntu-24.04-arm' }}
        with:
          path: packages/gui/dist_electron/DevSidecar-${{ env.BUILD_VERSION }}-linux-arm64.deb
          name: "DevSidecar-${{ env.BUILD_VERSION }}-linux-arm64.deb"
          if-no-files-found: error
      - name: "Upload DevSidecar-${{ env.BUILD_VERSION }}-linux-arm64.AppImage"
        uses: actions/upload-artifact@v4.4.0
        if: ${{ matrix.os == 'ubuntu-24.04-arm' }}
        with:
          path: packages/gui/dist_electron/DevSidecar-${{ env.BUILD_VERSION }}-linux-arm64.AppImage
          name: "DevSidecar-${{ env.BUILD_VERSION }}-linux-arm64.AppImage"
          if-no-files-found: error
      - name: "Upload DevSidecar-${{ env.BUILD_VERSION }}-linux-arm64.tar.gz"
        uses: actions/upload-artifact@v4.4.0
        if: ${{ matrix.os == 'ubuntu-24.04-arm' }}
        with:
          path: packages/gui/dist_electron/DevSidecar-${{ env.BUILD_VERSION }}-linux-arm64.tar.gz
          name: "DevSidecar-${{ env.BUILD_VERSION }}-linux-arm64.tar.gz"
          if-no-files-found: error
      - name: "Upload DevSidecar-${{ env.BUILD_VERSION }}-linux-arm64.rpm"
        uses: actions/upload-artifact@v4.4.0
        if: ${{ matrix.os == 'ubuntu-24.04-arm' }}
        with:
          path: packages/gui/dist_electron/DevSidecar-${{ env.BUILD_VERSION }}-linux-arm64.rpm
          name: "DevSidecar-${{ env.BUILD_VERSION }}-linux-arm64.rpm"
          if-no-files-found: error
      # endregion Upload artifacts - Linux
      # region Upload artifacts - Linux ARM64
      - name: "Upload DevSidecar-${{ env.BUILD_VERSION }}-linux-arm64.flatpak"
        uses: actions/upload-artifact@v4.4.0
        if: ${{ matrix.os == 'ubuntu-24.04-arm' }}
        with:
          path: packages/gui/dist_electron/DevSidecar-${{ env.BUILD_VERSION }}-linux-arm64.flatpak
          name: "DevSidecar-${{ env.BUILD_VERSION }}-linux-arm64.flatpak"
          if-no-files-found: error
      # endregion Upload artifacts - Linux ARM64
      # Upload artifacts - macOS
      - name: "Upload DevSidecar-${{ env.BUILD_VERSION }}-macos-x86_64.dmg"
        uses: actions/upload-artifact@v4.4.0
        if: ${{ matrix.os == 'macos' }}
        with:
          path: packages/gui/dist_electron/DevSidecar-${{ env.BUILD_VERSION }}-macos-x86_64.dmg
          name: "DevSidecar-${{ env.BUILD_VERSION }}-macos-x86_64.dmg"
          if-no-files-found: error
      - name: "Upload DevSidecar-${{ env.BUILD_VERSION }}-macos-arm64.dmg"
        uses: actions/upload-artifact@v4.4.0
        if: ${{ matrix.os == 'macos' }}
        with:
          path: packages/gui/dist_electron/DevSidecar-${{ env.BUILD_VERSION }}-macos-arm64.dmg
          name: "DevSidecar-${{ env.BUILD_VERSION }}-macos-arm64.dmg"
          if-no-files-found: error
      - name: "Upload DevSidecar-${{ env.BUILD_VERSION }}-macos-universal.dmg"
        uses: actions/upload-artifact@v4.4.0
        if: ${{ matrix.os == 'macos' }}
        with:
          path: packages/gui/dist_electron/DevSidecar-${{ env.BUILD_VERSION }}-macos-universal.dmg
          name: "DevSidecar-${{ env.BUILD_VERSION }}-macos-universal.dmg"
          if-no-files-found: error
      # endregion Upload artifacts - macOS
